name: 機能要望・改善提案
description: 新機能、UI改善、運用改善などを提案する
title: '[Feature]: '
labels:
- enhancement
body:
- type: markdown
  attributes:
    value: '機能要望・改善提案ありがとうございます。

      実装可否は、保守性・利用者への影響・非公式ツールとしての範囲を考慮して判断します。

      '
- type: textarea
  id: summary
  attributes:
    label: 提案の概要
    description: 何を改善したいかを簡潔に書いてください。
    placeholder: 例）カタログを折りたためるようにしたい
  validations:
    required: true
- type: dropdown
  id: area
  attributes:
    label: 関連する画面・機能
    multiple: true
    options:
    - 講義カタログ
    - 時間割
    - 特殊枠
    - 修了要件・単位計算
    - 保存・読込
    - カタログ拡張
    - スマホ表示
    - README・運用ドキュメント
    - その他
  validations:
    required: true
- type: textarea
  id: problem
  attributes:
    label: 現在困っていること
    description: どのような場面で不便か、または何を達成したいかを書いてください。
  validations:
    required: true
- type: textarea
  id: proposal
  attributes:
    label: 希望する解決方法
    description: 具体的なUIや挙動の案があれば書いてください。
- type: textarea
  id: alternatives
  attributes:
    label: 代替案
    description: 他に考えられる方法があれば記入してください。
- type: dropdown
  id: priority
  attributes:
    label: 重要度の目安
    options:
    - 低：あると便利
    - 中：作業効率が上がる
    - 高：現状の利用に大きく影響する
    - 不明
  validations:
    required: true
- type: checkboxes
  id: confirmation
  attributes:
    label: 確認事項
    options:
    - label: 個人情報を含む内容を記載していません。
      required: true
